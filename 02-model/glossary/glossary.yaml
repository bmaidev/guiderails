# Guiderails glossary — GENERATED, do not edit.
#
# Source of truth: 02-model/MODEL.md §3 (and MODEL-SKELETON.md §3 for the
# eight terms MODEL.md carries forward by name). Rebuild with:
#     node 02-model/glossary/build.mjs
#
# Criterion 2.3 asks services to publish the vocabulary they make people use.
# This is the standard applying that to itself (CLAUDE.md, Dogfooding).

modelVersion: "0.6"
termCount: 21
terms:
  - term: "Agent"
    definition: "software that autonomously or semi-autonomously perceives a service and takes actions on it in pursuit of a principal's goal. An agent is a *user agent* in the WCAG sense."
    source: "MODEL-SKELETON.md §3 (carried forward)"
  - term: "Agent-driven session"
    definition: "a session in which an agent presents a delegation, or in which the service otherwise establishes that an agent is operating."
    source: "MODEL.md §3"
  - term: "Agent-facing surface"
    definition: "any machine surface, plus any content or metadata reasonably expected to be consumed by agents (including accessibility semantics and discovery files)."
    source: "MODEL.md §3"
  - term: "Authority request"
    definition: "a message from an agent to a principal asking to be granted authority the agent does not hold. It binds the principal to nothing, changes no state the principal is accountable for, and is not a consequential action; the principal remains free to ignore it. Distinct from a delegation (which conveys authority) and from a consequential action (which creates an effect)."
    source: "MODEL.md §3"
  - term: "Binding determination"
    definition: "a determination the service operator will stand behind as its decision or assessment for the supplied circumstances."
    source: "MODEL.md §3"
  - term: "Confirmation token"
    definition: "the verifiable artefact by which a principal's confirmation of one designated action is conveyed to the service. Issued by the service to the principal; presented once by the agent; never minted by the agent."
    source: "MODEL.md §3"
  - term: "Consequential action"
    definition: "an action that creates, changes or terminates a legal or administrative state for the principal (submissions, declarations, payments, consents, withdrawals). Each service MUST maintain a published register of its consequential actions; the register is itself a machine surface."
    source: "MODEL-SKELETON.md §3 (carried forward)"
  - term: "Delegation"
    definition: "a verifiable, scoped, time-bounded, revocable grant of authority from a principal to an agent, expressed in a form the service can validate."
    source: "MODEL-SKELETON.md §3 (carried forward)"
  - term: "Delegation token"
    definition: "the verifiable artefact by which an agent proves a delegation to the service."
    source: "MODEL.md §3"
  - term: "Determination"
    definition: "a computed answer about eligibility, entitlement, obligation or amount, produced from declared inputs by versioned rules."
    source: "MODEL-SKELETON.md §3 (carried forward)"
  - term: "Duplicate-protected"
    definition: "implemented such that repeat submission of the same action cannot create an additional legal or administrative effect, and the response identifies the original effect."
    source: "MODEL.md §3"
  - term: "Essential journey"
    definition: "a journey without which the principal cannot obtain the service's core outcome. Essentiality is decided by the service operator against a published test, not asserted ad hoc."
    source: "MODEL-SKELETON.md §3 (carried forward)"
  - term: "Essentiality test"
    definition: "the service operator's published criteria for classifying a journey as essential. The classification and the test are both machine surfaces."
    source: "MODEL.md §3"
  - term: "Indicative determination"
    definition: "a determination provided for guidance that does not commit the service operator."
    source: "MODEL.md §3"
  - term: "Machine surface"
    definition: "any interface the service exposes that is designed for programmatic interpretation: declared tools, manifests, rules endpoints, structured data."
    source: "MODEL-SKELETON.md §3 (carried forward)"
  - term: "Non-delegable authority"
    definition: "authority that a delegation cannot convey, whatever its terms. Authority over delegations themselves is non-delegable (5.1.3)."
    source: "MODEL.md §3"
  - term: "Principal"
    definition: "the natural person (or their formally authorised human representative) on whose behalf an agent acts."
    source: "MODEL-SKELETON.md §3 (carried forward)"
  - term: "Principal-attributable confirmation"
    definition: "a confirmation the service can attribute to the principal because it was made through a channel under the principal's control which the agent can neither operate nor forge. An interaction within an agent-driven session is never principal-attributable."
    source: "MODEL.md §3"
  - term: "Principal-only action"
    definition: "a consequential action the service executes only on the principal's own request, and never on an agent's, whatever delegation the agent presents. Designation as principal-only is part of the consequential-actions register (5.3.3)."
    source: "MODEL.md §3"
  - term: "Safe step"
    definition: "a journey step whose execution creates no legal or administrative effect and changes no stored state about the principal other than session state."
    source: "MODEL.md §3"
  - term: "Service journey"
    definition: "a defined sequence of interactions culminating in a service outcome; the unit of conformance."
    source: "MODEL-SKELETON.md §3 (carried forward)"
